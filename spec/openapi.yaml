openapi: 3.1.0
info:
  title: OpenCheckout API
  version: "2026-04-24"
  summary: Headless checkout primitives for merchants, widgets, and enterprise backends.
  description: |
    OpenCheckout exposes a minimal set of resource-oriented checkout primitives
    (checkoutSessions, payments, addresses) modeled after Google AIP conventions
    (AIP-121, AIP-132, AIP-134, AIP-158, AIP-193).

    **Versioning** (ADR-011): Date-stamped via the `OpenCheckout-Version` header.
    Support window ≥ 12 months; responses echo the resolved version + default +
    optional `Sunset` header (RFC 8594).

    **Errors** (ADR-010): RFC 7807 Problem Details at
    `application/problem+json` with stable `code`, `category`, `retryable`,
    localized `userMessage` (ko/en/ja), `requestId`, optional `cause` chain.

    **Authentication** (ADR-004): Three layers — L1 API Key
    (`oc_{env}_{scope}_{body}`, Bearer), L2 Session JWT (ES256 + DPoP
    RFC 9449), L3 mutual TLS. Scope model matches OAuth2 fine-grained scopes.

    **Canonical enums** (ADR-019): `PaymentStatus` (7 values), `OrderStatus`
    (9 values). Vendor vocabulary (Toss `APPROVED`, etc.) is confined to
    adapter boundaries and MUST NOT cross this API surface.
  termsOfService: https://opencheckout.dev/terms
  contact:
    name: OpenCheckout Platform
    url: https://docs.opencheckout.dev
    email: platform@opencheckout.dev
  license:
    name: Apache-2.0
    identifier: Apache-2.0

servers:
  - url: https://api.opencheckout.dev
    description: Production
  - url: https://mtls.api.opencheckout.dev
    description: Production (mTLS enterprise endpoint)
  - url: https://api.sandbox.opencheckout.dev
    description: Sandbox

tags:
  - name: checkout
    description: Checkout session lifecycle (AIP-121 resource).
  - name: widget
    description: Browser widget bootstrap and public read-model endpoints.
  - name: payments
    description: Payment confirmation, refund, cancellation primitives.
  - name: addresses
    description: Address creation and retrieval (AddressDisplayDTO surface).
  - name: webhooks
    description: Outbound webhook event catalog (subscribe via dashboard).

security:
  - ApiKeyAuth: []
  - SessionJWT: []
    DPoP: []
  - MTLS: []

paths:
  /v1/widget/tokens:
    post:
      tags: [widget]
      summary: Issue a short-lived widget token
      operationId: createWidgetToken
      description: |
        Issues a 5-minute browser bootstrap token for the vanilla widget.
        Card data MUST NOT cross this boundary; Toss-hosted fields remain the
        only card-data surface (ADR-019 §3.12).
      x-scopes: ["checkout:create"]
      parameters:
        - $ref: '#/components/parameters/OpenCheckoutVersion'
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WidgetTokenCreateRequest' }
            examples:
              merchant_page:
                value:
                  orderId: order_01HXABCDEF0123456789ABCDEF
                  origin: https://merchant.example/checkout
      responses:
        '201':
          description: Widget token issued. Never cache this response.
          headers:
            X-OC-Request-ID: { $ref: '#/components/headers/XOCRequestId' }
            Cache-Control:
              description: Always `no-store`.
              schema: { type: string, enum: [no-store] }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WidgetToken' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /v1/public/orders/{publicId}:
    parameters:
      - $ref: '#/components/parameters/PublicOrderId'
      - $ref: '#/components/parameters/RequestId'
    get:
      tags: [widget]
      summary: Get a public order read model
      operationId: getPublicOrder
      security: []
      description: |
        Read-only, cache-friendly order projection used by browser widgets.
        The response intentionally excludes PII and tenant-private fields.
      responses:
        '200':
          description: OK.
          headers:
            X-OC-Request-ID: { $ref: '#/components/headers/XOCRequestId' }
            ETag:
              description: Weak validator for the public read model version.
              schema: { type: string }
            Cache-Control:
              description: Browser/CDN cache policy.
              schema: { type: string, example: "public, max-age=30, s-maxage=60" }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicOrder' }
        '404': { $ref: '#/components/responses/Problem' }

  /v1/checkoutSessions:
    post:
      tags: [checkout]
      summary: Create a checkout session
      operationId: createCheckoutSession
      description: |
        Creates a new checkout session (AIP-133 Create). Scope:
        `checkout:create`. Publishable keys (`oc_live_pk_`) may call this
        endpoint without additional scope.
      x-scopes: ["checkout:create"]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/OpenCheckoutVersion'
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutSessionCreateRequest'
            examples:
              krw_single_item:
                summary: KRW single-item checkout
                value:
                  amount: { amount: 89000, currency: KRW }
                  lineItems:
                    - sku: SKU-001
                      name: Ergonomic Mouse
                      quantity: 1
                      unitPrice: { amount: 89000, currency: KRW }
                  successUrl: https://merchant.example/thankyou
                  cancelUrl: https://merchant.example/cart
      responses:
        '201':
          description: Created.
          headers:
            X-OC-Request-ID: { $ref: '#/components/headers/XOCRequestId' }
            OpenCheckout-Version: { $ref: '#/components/headers/ResolvedVersion' }
            OpenCheckout-Version-Default: { $ref: '#/components/headers/DefaultVersion' }
            X-Idempotency-Replay: { $ref: '#/components/headers/IdempotencyReplay' }
            RateLimit-Limit: { $ref: '#/components/headers/RateLimitLimit' }
            RateLimit-Remaining: { $ref: '#/components/headers/RateLimitRemaining' }
            RateLimit-Reset: { $ref: '#/components/headers/RateLimitReset' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CheckoutSession' }
              examples:
                created:
                  value:
                    id: cs_01HXABCDEF0123456789ABCDEF
                    status: open
                    amount: { amount: 89000, currency: KRW }
                    expiresAt: "2026-04-24T12:30:00Z"
                    createdAt: "2026-04-24T12:00:00Z"
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '5XX': { $ref: '#/components/responses/Problem' }

  /v1/checkoutSessions/{checkoutSessionId}:
    parameters:
      - $ref: '#/components/parameters/CheckoutSessionId'
      - $ref: '#/components/parameters/OpenCheckoutVersion'
      - $ref: '#/components/parameters/RequestId'
    get:
      tags: [checkout]
      summary: Get a checkout session
      operationId: getCheckoutSession
      x-scopes: ["checkout:read"]
      responses:
        '200':
          description: OK.
          headers:
            X-OC-Request-ID: { $ref: '#/components/headers/XOCRequestId' }
            OpenCheckout-Version: { $ref: '#/components/headers/ResolvedVersion' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CheckoutSession' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '410':
          description: Checkout session expired (ADR-010 `checkout.session.expired`).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /v1/payments/{paymentId}:
    parameters:
      - $ref: '#/components/parameters/PaymentId'
      - $ref: '#/components/parameters/OpenCheckoutVersion'
      - $ref: '#/components/parameters/RequestId'
    get:
      tags: [payments]
      summary: Get a payment
      operationId: getPayment
      x-scopes: ["payment:read"]
      responses:
        '200':
          description: OK.
          headers:
            X-OC-Request-ID: { $ref: '#/components/headers/XOCRequestId' }
            OpenCheckout-Version: { $ref: '#/components/headers/ResolvedVersion' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Payment' }
              examples:
                captured:
                  value:
                    id: pay_01HXZ1234567890ABCDEFGHIJK
                    status: captured
                    amount: { amount: 89000, currency: KRW }
                    checkoutSessionId: cs_01HXABCDEF0123456789ABCDEF
                    capturedAt: "2026-04-24T12:05:30Z"
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }

  /v1/payments/{paymentId}:confirm:
    parameters:
      - $ref: '#/components/parameters/PaymentId'
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/OpenCheckoutVersion'
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/DPoPHeader'
    post:
      tags: [payments]
      summary: Confirm a payment
      description: |
        AIP-136 custom method (`:confirm`). Idempotent via `Idempotency-Key`;
        retry window 24h per ADR-019 §3.4 (Axis A).
      operationId: confirmPayment
      x-scopes: ["payment:confirm"]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PaymentConfirmRequest' }
            examples:
              toss:
                summary: Toss paymentKey confirm
                value:
                  paymentKey: tgen_202604240000abcdef
                  orderId: order_01HX...
                  amount: { amount: 89000, currency: KRW }
      responses:
        '200':
          description: Confirmed.
          headers:
            X-OC-Request-ID: { $ref: '#/components/headers/XOCRequestId' }
            OpenCheckout-Version: { $ref: '#/components/headers/ResolvedVersion' }
            X-Idempotency-Replay: { $ref: '#/components/headers/IdempotencyReplay' }
            X-Idempotency-Mismatch: { $ref: '#/components/headers/IdempotencyMismatch' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Payment' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '402':
          description: Payment declined (ADR-010 `payment.*` family).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '409':
          description: Idempotency mismatch or optimistic lock conflict.
          headers:
            X-Idempotency-Mismatch: { $ref: '#/components/headers/IdempotencyMismatch' }
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503': { $ref: '#/components/responses/Problem' }

  /v1/payments/{paymentId}:refund:
    parameters:
      - $ref: '#/components/parameters/PaymentId'
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/OpenCheckoutVersion'
      - $ref: '#/components/parameters/RequestId'
    post:
      tags: [payments]
      summary: Refund a payment (full or partial)
      description: |
        AIP-136 custom method. Partial refund when `amount` < payment amount;
        omit `amount` for full refund. Scope `payment:refund`
        (or `payment:refund:limited` for amount caps).
      operationId: refundPayment
      x-scopes: ["payment:refund"]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PaymentRefundRequest' }
            examples:
              partial:
                value:
                  amount: { amount: 10000, currency: KRW }
                  reason: customer_request
              full:
                value:
                  reason: defective_item
      responses:
        '200':
          description: Refund accepted.
          headers:
            X-OC-Request-ID: { $ref: '#/components/headers/XOCRequestId' }
            OpenCheckout-Version: { $ref: '#/components/headers/ResolvedVersion' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Refund' }
              examples:
                partial:
                  value:
                    id: rfd_01HXYREFUNDID0123456789ABC
                    paymentId: pay_01HXZ1234567890ABCDEFGHIJK
                    amount: { amount: 10000, currency: KRW }
                    status: succeeded
                    resultingPaymentStatus: partially_refunded
                    refundedAt: "2026-04-24T13:00:00Z"
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /v1/payments/{paymentId}:cancel:
    parameters:
      - $ref: '#/components/parameters/PaymentId'
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/OpenCheckoutVersion'
      - $ref: '#/components/parameters/RequestId'
    post:
      tags: [payments]
      summary: Cancel (void) a payment before capture
      description: |
        Voids an authorized payment before capture. Transitions:
        `authorized → voided`. After capture use `:refund`.
      operationId: cancelPayment
      x-scopes: ["payment:refund"]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PaymentCancelRequest' }
      responses:
        '200':
          description: Voided.
          headers:
            X-OC-Request-ID: { $ref: '#/components/headers/XOCRequestId' }
            OpenCheckout-Version: { $ref: '#/components/headers/ResolvedVersion' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Payment' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409':
          description: Payment state does not permit cancel (e.g. already captured).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /v1/addresses:
    post:
      tags: [addresses]
      summary: Create an address
      operationId: createAddress
      x-scopes: ["address:write"]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/OpenCheckoutVersion'
        - $ref: '#/components/parameters/RequestId'
        - name: Accept-Language
          in: header
          required: false
          schema: { type: string, example: "ko,en;q=0.8" }
          description: BCP 47 locale(s) for display formatting and error i18n.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddressCreateRequest' }
            examples:
              kr:
                value:
                  countryCode: KR
                  recipient:
                    name: 홍길동
                    phoneE164: "+821012345678"
                  postalCode: "06236"
                  line1: "서울특별시 강남구 테헤란로 123"
                  line2: "4층 401호"
                  isDefault: true
      responses:
        '201':
          description: Created.
          headers:
            X-OC-Request-ID: { $ref: '#/components/headers/XOCRequestId' }
            OpenCheckout-Version: { $ref: '#/components/headers/ResolvedVersion' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AddressDisplayDTO' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
    get:
      tags: [addresses]
      summary: List addresses (AIP-132)
      operationId: listAddresses
      x-scopes: ["address:read"]
      parameters:
        - $ref: '#/components/parameters/OpenCheckoutVersion'
        - $ref: '#/components/parameters/RequestId'
        - name: pageSize
          in: query
          description: AIP-158 page size (default 20, max 100).
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: pageToken
          in: query
          description: AIP-158 opaque continuation token.
          required: false
          schema: { type: string }
      responses:
        '200':
          description: OK.
          headers:
            X-OC-Request-ID: { $ref: '#/components/headers/XOCRequestId' }
            OpenCheckout-Version: { $ref: '#/components/headers/ResolvedVersion' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AddressListResponse' }

  /v1/addresses/{addressId}:
    parameters:
      - $ref: '#/components/parameters/AddressId'
      - $ref: '#/components/parameters/OpenCheckoutVersion'
      - $ref: '#/components/parameters/RequestId'
    get:
      tags: [addresses]
      summary: Get an address (display DTO)
      operationId: getAddress
      x-scopes: ["address:read"]
      responses:
        '200':
          description: OK.
          headers:
            X-OC-Request-ID: { $ref: '#/components/headers/XOCRequestId' }
            OpenCheckout-Version: { $ref: '#/components/headers/ResolvedVersion' }
            Sunset: { $ref: '#/components/headers/Sunset' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AddressDisplayDTO' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
    patch:
      tags: [addresses]
      summary: Update an address (AIP-134)
      operationId: updateAddress
      x-scopes: ["address:write"]
      parameters:
        - name: updateMask
          in: query
          required: false
          schema: { type: string, example: "recipient.phoneE164,line2" }
          description: AIP-134 field mask (comma-separated).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddressUpdateRequest' }
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AddressDisplayDTO' }
        '404': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }

components:

  securitySchemes:
    ApiKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: "oc_{env}_{scope}_{body}"
      description: |
        Server-side API key. Prefix determines env/scope
        (`oc_live_sk_`, `oc_live_pk_`, `oc_live_rk_`, `oc_test_*`).
        Transmitted as `Authorization: Bearer <key>`.
    SessionJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        ES256 Session JWT issued to Widget/browser. TTL ≤ 5min.
        MUST be paired with `DPoP` proof header (RFC 9449).
        `none` / `HS256` rejected per RFC 8725.
    DPoP:
      type: apiKey
      in: header
      name: DPoP
      description: RFC 9449 proof-of-possession JWT for SessionJWT binding.
    MTLS:
      type: mutualTLS
      description: X.509 client certificate (enterprise endpoint only).
    OcWebhookSig:
      type: apiKey
      in: header
      name: OC-Signature
      description: |
        Outbound webhook signature header
        `OC-Signature: t=<unix>,v1=<hex>,nonce=<b64u>,kid=<key-id>`
        (see ADR-014 §3 canonical).

  parameters:

    CheckoutSessionId:
      name: checkoutSessionId
      in: path
      required: true
      schema: { type: string, pattern: '^cs_[0-9A-HJKMNP-TV-Z]{26}$' }
      description: ULID prefixed with `cs_`.

    PaymentId:
      name: paymentId
      in: path
      required: true
      schema: { type: string, pattern: '^pay_[0-9A-HJKMNP-TV-Z]{26}$' }

    AddressId:
      name: addressId
      in: path
      required: true
      schema: { type: string, pattern: '^addr_[0-9A-HJKMNP-TV-Z]{26}$' }

    PublicOrderId:
      name: publicId
      in: path
      required: true
      schema: { type: string, minLength: 1, maxLength: 128 }
      description: Public, non-PII order projection identifier.

    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 16, maxLength: 255 }
      description: |
        Client-chosen UUID v4 or ULID. 24h retry window for `:confirm`;
        permanent (refundId-addressed) for `:refund`/`:cancel`.

    OpenCheckoutVersion:
      name: OpenCheckout-Version
      in: header
      required: false
      schema:
        type: string
        pattern: '^\d{4}-\d{2}-\d{2}$'
        example: "2026-04-24"
      description: API version (ISO date). Falls back to merchant account pin.

    RequestId:
      name: X-OC-Request-ID
      in: header
      required: false
      schema: { type: string, pattern: '^[0-9A-HJKMNP-TV-Z]{26}$' }
      description: Client-supplied ULID for correlation. Auto-generated if omitted.

    DPoPHeader:
      name: DPoP
      in: header
      required: false
      schema: { type: string, format: jwt }
      description: Required when using `SessionJWT` authentication.

  headers:

    XOCRequestId:
      description: Server-resolved request correlation ULID.
      schema: { type: string, pattern: '^[0-9A-HJKMNP-TV-Z]{26}$' }

    ResolvedVersion:
      description: API date resolved for this response.
      schema: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }

    DefaultVersion:
      description: Merchant account default pin.
      schema: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }

    Sunset:
      description: RFC 8594 sunset date for deprecated surfaces.
      schema: { type: string, format: http-date }

    IdempotencyReplay:
      description: '`true` when the response is replayed from idempotency store.'
      schema: { type: string, enum: ["true"] }

    IdempotencyMismatch:
      description: |
        Mismatch reason when 409: `payload|operation|in-flight|expired`.
      schema:
        type: string
        enum: [payload, operation, in-flight, expired]

    RateLimitLimit:
      description: IETF draft RateLimit header — window quota.
      schema: { type: integer }

    RateLimitRemaining:
      description: Remaining quota in current window.
      schema: { type: integer }

    RateLimitReset:
      description: Seconds until window reset.
      schema: { type: integer }

    RetryAfter:
      description: RFC 9110 retry hint (seconds).
      schema: { type: integer }

  responses:

    Problem:
      description: RFC 7807 Problem Details error.
      headers:
        X-OC-Request-ID: { $ref: '#/components/headers/XOCRequestId' }
        OpenCheckout-Version: { $ref: '#/components/headers/ResolvedVersion' }
        Retry-After: { $ref: '#/components/headers/RetryAfter' }
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
          examples:
            invalidPostal:
              summary: Invalid Korean postal code
              value:
                type: https://docs.opencheckout.dev/errors/address/invalid-postal
                title: Invalid postal code format
                status: 422
                detail: Korean postal code must be 5 digits
                instance: /v1/addresses
                code: address.validation.postal_format
                category: validation
                retryable: false
                userMessage:
                  ko: 우편번호는 5자리 숫자여야 합니다
                  en: Postal code must be 5 digits
                  ja: 郵便番号は5桁で入力してください
                docUrl: https://docs.opencheckout.dev/errors/address/invalid-postal
                requestId: req_01HX9YZABCDEFG0123456789

    RateLimited:
      description: Rate limit exceeded.
      headers:
        X-OC-Request-ID: { $ref: '#/components/headers/XOCRequestId' }
        RateLimit-Limit: { $ref: '#/components/headers/RateLimitLimit' }
        RateLimit-Remaining: { $ref: '#/components/headers/RateLimitRemaining' }
        RateLimit-Reset: { $ref: '#/components/headers/RateLimitReset' }
        Retry-After: { $ref: '#/components/headers/RetryAfter' }
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }

  schemas:

    Problem:
      type: object
      description: RFC 7807 + OpenCheckout extension (ADR-010).
      required:
        - type
        - title
        - status
        - code
        - category
        - retryable
        - userMessage
        - docUrl
        - requestId
      properties:
        type: { type: string, format: uri, description: URI identifying the error class. }
        title: { type: string, description: Short human-readable summary. }
        status: { type: integer, minimum: 400, maximum: 599 }
        detail: { type: string }
        instance: { type: string, format: uri-reference }
        code:
          type: string
          pattern: '^[a-z_]+\.[a-z_]+\.[a-z_]+$'
          description: Stable dotted error code (`{domain}.{subdomain}.{reason}`).
          example: address.validation.postal_format
        category:
          type: string
          enum:
            - validation
            - authentication
            - authorization
            - rate_limit
            - payment_declined
            - external_service
            - server_error
            - resource_not_found
            - conflict
            - compliance_blocker
        retryable: { type: boolean }
        userMessage:
          type: object
          description: Localized buyer-facing messages keyed by BCP 47 tag.
          additionalProperties: { type: string }
          example: { ko: "오류가 발생했습니다", en: "An error occurred", ja: "エラーが発生しました" }
        docUrl: { type: string, format: uri }
        requestId: { type: string }
        cause:
          $ref: '#/components/schemas/Problem'
          description: Upstream / nested cause (depth ≤ 3). No PII or stack traces.
        errors:
          type: array
          description: Field-level validation issues (validation category only).
          items:
            type: object
            required: [field, code, userMessage]
            properties:
              field: { type: string }
              code: { type: string }
              userMessage:
                type: object
                additionalProperties: { type: string }

    Money:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: integer
          format: int64
          description: Value in minor units (KRW uses whole won, 0 fractional).
          example: 89000
        currency:
          type: string
          enum: [KRW, USD, JPY]

    PaymentStatus:
      type: string
      description: Canonical payment lifecycle (ADR-019 §3.1).
      enum:
        - authorized
        - captured
        - settled
        - voided
        - refunded
        - partially_refunded
        - failed

    OrderStatus:
      type: string
      description: Canonical order DAG (ADR-019 §3.2).
      enum:
        - draft
        - pending_payment
        - paid
        - processing
        - label_purchased
        - in_transit
        - delivered
        - completed
        - canceled

    LineItem:
      type: object
      required: [sku, name, quantity, unitPrice]
      properties:
        sku: { type: string, maxLength: 64 }
        name: { type: string, maxLength: 255 }
        quantity: { type: integer, minimum: 1 }
        unitPrice: { $ref: '#/components/schemas/Money' }
        metadata:
          type: object
          additionalProperties: { type: string }

    CheckoutSessionCreateRequest:
      type: object
      required: [amount, lineItems, successUrl, cancelUrl]
      properties:
        amount: { $ref: '#/components/schemas/Money' }
        lineItems:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/LineItem' }
        successUrl: { type: string, format: uri }
        cancelUrl: { type: string, format: uri }
        customerEmail: { type: string, format: email }
        shippingAddressId:
          type: string
          pattern: '^addr_[0-9A-HJKMNP-TV-Z]{26}$'
        locale:
          type: string
          description: BCP 47 tag.
          example: ko-KR
        expiresInSeconds:
          type: integer
          minimum: 60
          maximum: 86400
          default: 1800
        metadata:
          type: object
          additionalProperties: { type: string }

    CheckoutSession:
      type: object
      required: [id, status, amount, expiresAt, createdAt]
      properties:
        id: { type: string, pattern: '^cs_[0-9A-HJKMNP-TV-Z]{26}$' }
        status:
          type: string
          enum: [open, complete, expired, canceled]
        amount: { $ref: '#/components/schemas/Money' }
        paymentId:
          type: string
          nullable: true
          pattern: '^pay_[0-9A-HJKMNP-TV-Z]{26}$'
        url:
          type: string
          format: uri
          description: Hosted checkout URL (if applicable).
        expiresAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        metadata:
          type: object
          additionalProperties: { type: string }

    WidgetTokenCreateRequest:
      type: object
      required: [orderId]
      properties:
        orderId:
          type: string
          minLength: 1
          description: Merchant order identifier to bind into the widget token.
        origin:
          type: string
          format: uri
          description: Merchant page origin. Normalized to scheme + host + port.

    WidgetToken:
      type: object
      required: [token, tokenType, tenantId, orderId, allowedOrigins, expiresAt]
      properties:
        token: { type: string, minLength: 16 }
        tokenType: { type: string, enum: [Bearer] }
        tenantId: { type: string }
        orderId: { type: string }
        allowedOrigins:
          type: array
          items: { type: string, format: uri }
        expiresAt: { type: string, format: date-time }

    PublicOrder:
      type: object
      required: [publicId, status, amount, updatedAt, version]
      properties:
        publicId: { type: string }
        status: { $ref: '#/components/schemas/OrderStatus' }
        amount: { $ref: '#/components/schemas/Money' }
        updatedAt: { type: string, format: date-time }
        version:
          type: string
          description: Opaque read-model version used for weak ETags.

    Payment:
      type: object
      required: [id, status, amount, checkoutSessionId]
      properties:
        id: { type: string, pattern: '^pay_[0-9A-HJKMNP-TV-Z]{26}$' }
        status: { $ref: '#/components/schemas/PaymentStatus' }
        amount: { $ref: '#/components/schemas/Money' }
        amountRefunded:
          $ref: '#/components/schemas/Money'
          description: Cumulative refunded amount (0 if none).
        checkoutSessionId: { type: string, pattern: '^cs_[0-9A-HJKMNP-TV-Z]{26}$' }
        method:
          type: string
          description: Logical payment method (e.g. `card`, `kakao_pay`, `toss_pay`).
          example: card
        providerReference:
          type: string
          description: Opaque PG reference (masked paymentKey/chargeId).
        authorizedAt: { type: string, format: date-time, nullable: true }
        capturedAt: { type: string, format: date-time, nullable: true }
        voidedAt: { type: string, format: date-time, nullable: true }
        failedAt: { type: string, format: date-time, nullable: true }
        failureCode:
          type: string
          nullable: true
          description: Canonical failure code (e.g. `payment.card.declined`).

    PaymentConfirmRequest:
      type: object
      required: [paymentKey, orderId, amount]
      properties:
        paymentKey: { type: string, minLength: 8 }
        orderId: { type: string }
        amount: { $ref: '#/components/schemas/Money' }
        threeDsResult:
          type: object
          additionalProperties: true
          description: Optional 3DS challenge result envelope.

    PaymentRefundRequest:
      type: object
      required: [reason]
      properties:
        amount:
          $ref: '#/components/schemas/Money'
          description: Omit for full refund.
        reason:
          type: string
          enum: [customer_request, duplicate, fraudulent, defective_item, other]
        merchantNote:
          type: string
          maxLength: 500

    PaymentCancelRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          enum: [customer_request, fraud_suspected, stock_unavailable, other]

    Refund:
      type: object
      required: [id, paymentId, amount, status, resultingPaymentStatus, refundedAt]
      properties:
        id: { type: string, pattern: '^rfd_[0-9A-HJKMNP-TV-Z]{26}$' }
        paymentId: { type: string, pattern: '^pay_[0-9A-HJKMNP-TV-Z]{26}$' }
        amount: { $ref: '#/components/schemas/Money' }
        status:
          type: string
          enum: [pending, succeeded, failed]
        resultingPaymentStatus:
          $ref: '#/components/schemas/PaymentStatus'
        refundedAt: { type: string, format: date-time }

    AddressRecipient:
      type: object
      required: [name, phoneE164]
      properties:
        name: { type: string, maxLength: 100 }
        phoneE164:
          type: string
          pattern: '^\+[1-9]\d{1,14}$'
          example: "+821012345678"
        email: { type: string, format: email }

    AddressCreateRequest:
      type: object
      required: [countryCode, recipient, line1, postalCode]
      properties:
        countryCode:
          type: string
          pattern: '^[A-Z]{2}$'
          description: ISO 3166-1 alpha-2.
          example: KR
        recipient: { $ref: '#/components/schemas/AddressRecipient' }
        line1: { type: string, maxLength: 255 }
        line2: { type: string, maxLength: 255 }
        locality: { type: string, maxLength: 100 }
        administrativeArea: { type: string, maxLength: 100 }
        postalCode: { type: string, maxLength: 20 }
        isDefault: { type: boolean, default: false }

    AddressUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/AddressCreateRequest'
      description: Partial update — combine with `updateMask` (AIP-134).

    AddressDisplayDTO:
      type: object
      description: PRD §5-6-1 display projection of an address resource.
      required:
        - id
        - displayLocale
        - formatted
        - recipient
        - countryCode
        - isDefault
        - verified
      properties:
        id: { type: string, pattern: '^addr_[0-9A-HJKMNP-TV-Z]{26}$' }
        displayLocale:
          type: string
          description: BCP 47 tag that `formatted` is rendered in.
          example: ko-KR
        formatted:
          type: string
          description: Locale-appropriate single-line formatted address.
          example: "서울특별시 강남구 테헤란로 123, 4층 401호 (06236)"
        recipient: { $ref: '#/components/schemas/AddressRecipient' }
        countryCode: { type: string, pattern: '^[A-Z]{2}$' }
        isDefault: { type: boolean }
        verified:
          type: boolean
          description: True when upstream address verification passed.
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AddressListResponse:
      type: object
      required: [addresses, nextPageToken]
      properties:
        addresses:
          type: array
          items: { $ref: '#/components/schemas/AddressDisplayDTO' }
        nextPageToken:
          type: string
          description: Empty string when no more pages (AIP-158).

  # ---------- Webhook event catalog (ADR-002) ----------

  x-tagGroups:
    - name: Core
      tags: [checkout, payments, addresses]
    - name: Events
      tags: [webhooks]

webhooks:

  checkout.session.completed:
    post:
      tags: [webhooks]
      summary: Checkout session completed
      security:
        - OcWebhookSig: []
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookEnvelope' }

  checkout.session.expired:
    post:
      tags: [webhooks]
      summary: Checkout session expired (TTL reached)
      security: [ { OcWebhookSig: [] } ]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookEnvelope' }

  payment.authorized:
    post:
      tags: [webhooks]
      summary: Payment authorized (pre-capture)
      security: [ { OcWebhookSig: [] } ]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookEnvelope' }

  payment.captured:
    post:
      tags: [webhooks]
      summary: Payment captured
      security: [ { OcWebhookSig: [] } ]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookEnvelope' }

  payment.settled:
    post:
      tags: [webhooks]
      summary: Payment settled (T+N)
      security: [ { OcWebhookSig: [] } ]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookEnvelope' }

  payment.voided:
    post:
      tags: [webhooks]
      summary: Payment voided (pre-capture cancel)
      security: [ { OcWebhookSig: [] } ]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookEnvelope' }

  payment.refunded:
    post:
      tags: [webhooks]
      summary: Payment fully refunded
      security: [ { OcWebhookSig: [] } ]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookEnvelope' }

  payment.partially_refunded:
    post:
      tags: [webhooks]
      summary: Payment partially refunded
      security: [ { OcWebhookSig: [] } ]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookEnvelope' }

  payment.failed:
    post:
      tags: [webhooks]
      summary: Payment failed or declined
      security: [ { OcWebhookSig: [] } ]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookEnvelope' }

  order.canceled:
    post:
      tags: [webhooks]
      summary: Order canceled (guarded against post-delivery transition)
      security: [ { OcWebhookSig: [] } ]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookEnvelope' }

  shipment.label_purchased:
    post:
      tags: [webhooks]
      summary: Shipping label purchased (includes immutable AddressSnapshot, ADR-019 §3.11)
      security: [ { OcWebhookSig: [] } ]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookEnvelope' }

  shipment.delivered:
    post:
      tags: [webhooks]
      summary: Shipment delivered
      security: [ { OcWebhookSig: [] } ]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookEnvelope' }
