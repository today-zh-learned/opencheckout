app = "opencheckout-gateway"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  RUNTIME = "node"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "10s"
    method = "GET"
    path = "/healthz"
    timeout = "2s"

[deploy]
  strategy = "bluegreen"
  wait_timeout = "5m"

[vm]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024
