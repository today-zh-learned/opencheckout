name: test

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 17 * * *" # 02:00 KST nightly

permissions:
  contents: read

jobs:
  small:
    name: "@small + build"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
        with:
          version: 9
      - uses: actions/setup-node@26961cf329f22f6837d5f54c3efd76b480300ace # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:small
      - run: pnpm build

  medium:
    name: "@medium"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: small
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: opencheckout_test
          POSTGRES_PASSWORD: test
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d opencheckout_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
        with:
          version: 9
      - uses: actions/setup-node@26961cf329f22f6837d5f54c3efd76b480300ace # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:medium

  api-lint:
    name: "API linter"
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4
      - run: |
          curl -sSL https://github.com/googleapis/api-linter/releases/download/v1.68.1/api-linter-1.68.1-linux-amd64.tar.gz | tar xz
          ./api-linter spec/openapi.yaml --set-exit-status

  oasdiff:
    name: "oasdiff"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4
        with:
          fetch-depth: 0
      - run: |
          git fetch origin main
          docker run --rm -v "$(pwd):/repo" tufin/oasdiff:latest \
            breaking --fail-on ERR \
            /repo/spec/openapi.yaml \
            <(git show origin/main:spec/openapi.yaml)

  security:
    name: "security scans"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
      - uses: returntocorp/semgrep-action@c49e4a59731777134cbfc61f6f9cdfc19c7a2f43
        with:
          config: >-
            p/owasp-top-ten
            p/typescript
            p/nodejs
            p/secrets
      - uses: github/codeql-action/init@f779452ac5af1c261dce0346a8f964149f49322b # v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@f779452ac5af1c261dce0346a8f964149f49322b

  large:
    name: "@large"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule' || contains(github.ref, 'release/')
    env:
      TOSS_TEST_CLIENT_KEY: ${{ secrets.TOSS_TEST_CLIENT_KEY }}
      TOSS_TEST_SECRET_KEY: ${{ secrets.TOSS_TEST_SECRET_KEY }}
    steps:
      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
        with:
          version: 9
      - uses: actions/setup-node@26961cf329f22f6837d5f54c3efd76b480300ace # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:large
